name: 发布安装包

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本，例如 1.0.0"
        required: true
        default: ""
      openwrt_ipk_version:
        description: "用于 ipk 构建的 OpenWrt 版本"
        required: true
        default: "23.05.5"
      openwrt_apk_version:
        description: "用于 apk 构建的 OpenWrt 版本"
        required: true
        default: "25.12.3"
      prerelease:
        description: "是否发布为预发布版本"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: 构建 ${{ matrix.format }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: ipk
            default_openwrt_version: "23.05.5"
          - format: apk
            default_openwrt_version: "25.12.3"

    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-setuptools python3-pip python3-pyelftools \
            rsync swig unzip zlib1g-dev file wget curl zstd

      - name: 校验版本号
        run: |
          VERSION='${{ github.event.inputs.version }}'
          if [[ ! "$VERSION" =~ ^[A-Za-z0-9._-]+$ ]] || [[ "$VERSION" == "." ]] || [[ "$VERSION" == ".." ]] || [[ "$VERSION" == -* ]]; then
            echo "不安全的版本号: $VERSION"
            exit 1
          fi

      - name: 写入版本号
        run: |
          VERSION='${{ github.event.inputs.version }}'
          awk -v ver="$VERSION" '
            BEGIN { replaced=0 }
            /^PKG_VERSION:=/ { print "PKG_VERSION:=" ver; replaced=1; next }
            { print }
            END { if (!replaced) exit 2 }
          ' Makefile > Makefile.tmp
          mv Makefile.tmp Makefile
          grep -n '^PKG_VERSION:=' Makefile

      - name: 解析 OpenWrt SDK
        id: sdk
        run: |
          if [ "${{ matrix.format }}" = "ipk" ]; then
            VER="${{ github.event.inputs.openwrt_ipk_version }}"
          else
            VER="${{ github.event.inputs.openwrt_apk_version }}"
          fi
          if [ -z "$VER" ]; then
            VER="${{ matrix.default_openwrt_version }}"
          fi

          BASE_URL="https://downloads.openwrt.org/releases/${VER}/targets/x86/64"
          SDK_NAME="$(curl -fsSL "${BASE_URL}/" | grep -oE 'openwrt-sdk-[^" ]+Linux-x86_64\.tar\.(zst|xz)' | head -n1)"
          if [ -z "$SDK_NAME" ]; then
            echo "找不到 SDK: ${BASE_URL}"
            exit 1
          fi

          echo "sdk_url=${BASE_URL}/${SDK_NAME}" >> "$GITHUB_OUTPUT"
          echo "sdk_name=${SDK_NAME}" >> "$GITHUB_OUTPUT"
          echo "openwrt_version=${VER}" >> "$GITHUB_OUTPUT"

      - name: 缓存 SDK 压缩包
        uses: actions/cache@v4
        with:
          path: sdk.tar
          key: ${{ runner.os }}-${{ steps.sdk.outputs.sdk_name }}

      - name: 下载并解压 SDK
        run: |
          if [ ! -f sdk.tar ]; then
            wget -q "${{ steps.sdk.outputs.sdk_url }}" -O sdk.tar
          fi
          mkdir -p sdk
          tar -xf sdk.tar -C sdk
          SDK_DIR="$(find sdk -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          mv "$SDK_DIR" openwrt

      - name: 缓存 OpenWrt 下载目录
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ steps.sdk.outputs.openwrt_version }}-x86-64-${{ matrix.format }}-v1

      - name: 更新 feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 注入软件包
        run: |
          mkdir -p openwrt/package/openwrt-wireless-helper
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "openwrt" \
            --exclude "sdk" \
            --exclude "artifacts" \
            ./ openwrt/package/openwrt-wireless-helper/

      - name: 生成配置
        working-directory: openwrt
        run: |
          echo "CONFIG_ALL_KMODS=n" >> .config
          make defconfig

      - name: 编译软件包
        working-directory: openwrt
        run: |
          make package/openwrt-wireless-helper/{clean,compile} -j1 V=s

      - name: 收集产物
        run: |
          mkdir -p artifacts
          EXT="${{ matrix.format }}"
          if [ "$EXT" = "ipk" ]; then
            find openwrt/bin -type f -name "openwrt-wireless-helper_*.ipk" -exec cp -v {} artifacts/ \;
          else
            find openwrt/bin -type f -name "openwrt-wireless-helper-*.apk" -exec cp -v {} artifacts/ \;
          fi

          if [ -z "$(ls artifacts/*.${EXT} 2>/dev/null)" ]; then
            echo "没有找到 ${EXT} 产物。"
            echo "=== openwrt-wireless-helper 相关文件 ==="
            find openwrt -type f -name "openwrt-wireless-helper*" | sort || true
            echo "=== 所有包产物 ==="
            find openwrt/bin -type f \( -name "*.ipk" -o -name "*.apk" \) | sort || true
            exit 1
          fi
          ls -lh artifacts/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-wireless-helper-${{ matrix.format }}
          path: artifacts/*.${{ matrix.format }}

  publish:
    name: 发布到 GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: openwrt-wireless-helper-*
          merge-multiple: true

      - name: 生成发布说明
        run: |
          VERSION='${{ github.event.inputs.version }}'
          OPENWRT_VERSION="ipk: ${{ github.event.inputs.openwrt_ipk_version }} / apk: ${{ github.event.inputs.openwrt_apk_version }}"
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            TEMPLATE=".github/prerelease-template.md"
          else
            TEMPLATE=".github/release-template.md"
          fi

          sed \
            -e "s|\${VERSION}|${VERSION}|g" \
            -e "s|\${OPENWRT_VERSION}|${OPENWRT_VERSION}|g" \
            "$TEMPLATE" > release-notes.md

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: release-assets/*
          body_path: release-notes.md
          draft: ${{ github.event.inputs.prerelease != 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          overwrite_files: true
